name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "docs/**/*.md"
          config: .markdownlint.json

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts/
          severity: warning

      - name: Validate docs exist
        run: python3 tests/test_docs_exist.py

      - name: Check internal links
        run: python3 tests/test_internal_links.py

      - name: Validate configs
        run: python3 tests/test_configs.py

      - name: Build HTML
        run: python3 scripts/build-html.py

      - name: Verify HTML output
        run: python3 tests/test_html_build.py

  build-and-upload:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zip wget git

      - name: Build HTML documentation
        run: python3 scripts/build-html.py

      # --- Mirror external docs ---
      - name: Mirror Python docs
        run: bash scripts/mirror-python-docs.sh
        continue-on-error: true

      - name: Mirror Node.js docs
        run: bash scripts/mirror-nodejs-docs.sh
        continue-on-error: true

      - name: Mirror Arduino docs
        run: bash scripts/mirror-arduino-docs.sh
        continue-on-error: true

      - name: Mirror ESP-IDF docs
        run: bash scripts/mirror-esp-idf-docs.sh
        continue-on-error: true

      - name: Mirror Meshtastic docs
        run: bash scripts/mirror-meshtastic-docs.sh
        continue-on-error: true

      # --- Download toolchains ---
      - name: Download toolchains
        run: bash scripts/download-toolchains.sh
        continue-on-error: true

      - name: Download portable editors
        run: bash scripts/download-portable-editors.sh
        continue-on-error: true

      # --- Download SDR software ---
      - name: Download SDR software
        run: bash scripts/download-sdr-software.sh
        continue-on-error: true

      # --- Download CHIRP ---
      - name: Download CHIRP
        run: bash scripts/download-chirp.sh
        continue-on-error: true

      # --- Download firmware ---
      - name: Download firmware
        run: bash scripts/download-firmware.sh
        continue-on-error: true

      # --- Download datasheets ---
      - name: Download datasheets
        run: bash scripts/download-datasheets.sh
        continue-on-error: true

      # --- Cache packages ---
      - name: Cache npm packages
        run: bash scripts/download-npm-packages.sh
        continue-on-error: true

      - name: Cache pip packages
        run: bash scripts/download-pip-packages.sh
        continue-on-error: true

      # --- Docker images skipped (8-12 GB, run `make docker` locally) ---

      - name: Show build sizes
        run: |
          echo "=== Build directory contents ==="
          du -sh build/*/ 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== Total build size ==="
          du -sh build/ 2>/dev/null || echo "0"

      # --- Create split release zips (GitHub max 2 GB per asset) ---
      - name: Create release zips
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"

          # Core: docs, HTML, scripts, config, static (always small)
          zip -r "offgrid-electronics-${VERSION}-core.zip" \
            docs/ build/html/ scripts/ config/ static/ templates/ \
            START_HERE.html README.md LICENSE Makefile .gitignore CHANGELOG.md \
            -x '*.git*'
          echo "Core: $(du -h "offgrid-electronics-${VERSION}-core.zip" | cut -f1)"

          # Toolchains: Arduino IDE, ESP-IDF, PlatformIO, editors
          if [ -d build/toolchains ] || [ -d build/editors ]; then
            zip -r "offgrid-electronics-${VERSION}-toolchains.zip" \
              build/toolchains/ build/editors/ \
              -x '*.git*' 2>/dev/null || true
            echo "Toolchains: $(du -h "offgrid-electronics-${VERSION}-toolchains.zip" | cut -f1)"
          fi

          # Mirrored docs: Python, Node.js, Arduino, ESP-IDF, Meshtastic
          if [ -d build/docs ]; then
            zip -r "offgrid-electronics-${VERSION}-mirrored-docs.zip" \
              build/docs/ \
              -x '*.git*' -x 'build/docs/devdocs/devdocs/.git/*' 2>/dev/null || true
            echo "Mirrored docs: $(du -h "offgrid-electronics-${VERSION}-mirrored-docs.zip" | cut -f1)"
          fi

          # Extras: SDR, CHIRP, firmware, datasheets, packages
          EXTRA_DIRS=""
          for d in build/sdr build/radio build/firmware build/datasheets build/packages; do
            [ -d "$d" ] && EXTRA_DIRS="$EXTRA_DIRS $d/"
          done
          if [ -n "$EXTRA_DIRS" ]; then
            zip -r "offgrid-electronics-${VERSION}-extras.zip" \
              $EXTRA_DIRS \
              -x '*.git*' 2>/dev/null || true
            echo "Extras: $(du -h "offgrid-electronics-${VERSION}-extras.zip" | cut -f1)"
          fi

          echo ""
          echo "=== Release zips ==="
          ls -lh offgrid-electronics-*.zip

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: offgrid-electronics-*.zip
