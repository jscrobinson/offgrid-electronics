name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "docs/**/*.md"
          config: .markdownlint.json

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts/
          severity: warning

      - name: Validate docs exist
        run: python3 tests/test_docs_exist.py

      - name: Check internal links
        run: python3 tests/test_internal_links.py

      - name: Validate configs
        run: python3 tests/test_configs.py

      - name: Build HTML
        run: python3 scripts/build-html.py

      - name: Verify HTML output
        run: python3 tests/test_html_build.py

  build-and-upload:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build HTML documentation
        run: python3 scripts/build-html.py

      - name: Create release zip
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          ZIP_NAME="offgrid-electronics-${VERSION}.zip"
          zip -r "$ZIP_NAME" \
            docs/ build/html/ scripts/ config/ static/ templates/ \
            START_HERE.html README.md LICENSE Makefile .gitignore \
            -x '*.git*'
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ env.ZIP_NAME }}
