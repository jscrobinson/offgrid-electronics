name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "docs/**/*.md"
          config: .markdownlint.json

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts/
          severity: warning

      - name: Validate docs exist
        run: python3 tests/test_docs_exist.py

      - name: Check internal links
        run: python3 tests/test_internal_links.py

      - name: Validate configs
        run: python3 tests/test_configs.py

      - name: Build HTML
        run: python3 scripts/build-html.py

      - name: Verify HTML output
        run: python3 tests/test_html_build.py

  build-and-upload:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip wget git

      - name: Build HTML documentation
        run: python3 scripts/build-html.py

      # --- Mirror external docs ---
      - name: Mirror Python docs
        run: bash scripts/mirror-python-docs.sh
        continue-on-error: true

      - name: Mirror Node.js docs
        run: bash scripts/mirror-nodejs-docs.sh
        continue-on-error: true

      - name: Mirror Arduino docs
        run: bash scripts/mirror-arduino-docs.sh
        continue-on-error: true

      - name: Mirror ESP-IDF docs
        run: bash scripts/mirror-esp-idf-docs.sh
        continue-on-error: true

      - name: Mirror Meshtastic docs
        run: bash scripts/mirror-meshtastic-docs.sh
        continue-on-error: true

      # --- Download toolchains ---
      - name: Download toolchains
        run: bash scripts/download-toolchains.sh
        continue-on-error: true

      - name: Download portable editors
        run: bash scripts/download-portable-editors.sh
        continue-on-error: true

      # --- Download SDR software ---
      - name: Download SDR software
        run: bash scripts/download-sdr-software.sh
        continue-on-error: true

      # --- Download CHIRP ---
      - name: Download CHIRP
        run: bash scripts/download-chirp.sh
        continue-on-error: true

      # --- Download firmware ---
      - name: Download firmware
        run: bash scripts/download-firmware.sh
        continue-on-error: true

      # --- Download datasheets ---
      - name: Download datasheets
        run: bash scripts/download-datasheets.sh
        continue-on-error: true

      # --- Cache packages ---
      - name: Cache npm packages
        run: bash scripts/download-npm-packages.sh
        continue-on-error: true

      - name: Cache pip packages
        run: bash scripts/download-pip-packages.sh
        continue-on-error: true

      # --- Docker images (skipped — too large for GHA, users run locally) ---
      # Docker images require `docker pull` + `docker save` which is slow
      # and produces 8-12 GB of tarballs. Users should run `make docker` locally.

      - name: Show build sizes
        run: |
          echo "=== Build directory contents ==="
          du -sh build/*/ 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== Total build size ==="
          du -sh build/ 2>/dev/null || echo "0"

      - name: Create release zip
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          ZIP_NAME="offgrid-electronics-${VERSION}.zip"
          zip -r "$ZIP_NAME" \
            docs/ build/ scripts/ config/ static/ templates/ \
            START_HERE.html README.md LICENSE Makefile .gitignore \
            CHANGELOG.md \
            -x '*.git*' \
            -x 'build/docs/devdocs/devdocs/.git/*'
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "Zip size: $(du -h "$ZIP_NAME" | cut -f1)"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ env.ZIP_NAME }}
